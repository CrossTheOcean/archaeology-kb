<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考古知识库 - 关系图谱</title>
<link rel="stylesheet" href="css/app.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="js/data-index.js"></script>
<script src="js/relations-index.js"></script>
<script src="js/app.js"></script>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-header">
      <h1>🏛️ 考古知识库</h1>
      <p>《考古学专刊·丁种》智能标注系统</p>
    </div>
    <div class="nav-menu">
      <a href="index.html" class="nav-item"><span class="icon">📊</span>仪表盘</a>
      <a href="reports.html" class="nav-item"><span class="icon">📚</span>报告库</a>
      <a href="entities.html" class="nav-item"><span class="icon">🏷️</span>实体浏览器</a>
      <a href="relations.html" class="nav-item active"><span class="icon">🕸️</span>关系图谱</a>
      <a href="qa.html" class="nav-item"><span class="icon">💬</span>智能问答</a>
      <div class="nav-divider"></div>
      <div class="nav-label">已有页面</div>
      <a href="../index.html" class="nav-item" target="_blank"><span class="icon">🌐</span>总览网站</a>
      <a href="../cross_report_analysis.html" class="nav-item" target="_blank"><span class="icon">📈</span>跨报告分析</a>
      <a href="../output/archaeology_sites_map.html" class="nav-item" target="_blank"><span class="icon">🗺️</span>GIS地图</a>
    </div>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">关系图谱</div>
    </div>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="card-title">选择遗址查看关系网络</div>
        </div>
        <select id="site-select" style="padding: 10px 16px; border-radius: 8px; border: 1px solid var(--border); font-size: 1em; min-width: 300px; background: white;">
          <option value="">-- 选择遗址 --</option>
        </select>
      </div>

      <div id="site-info" style="display:none;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="card">
            <div class="card-header">
              <div class="card-title">关系统计</div>
            </div>
            <div id="relation-stats" style="font-size: 0.9em;"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <div class="card-title">高频关系 TOP10</div>
            </div>
            <table class="data-table" id="top-pairs-table">
              <thead><tr><th>主体</th><th>关系</th><th>客体</th><th>次数</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">关系网络可视化</div>
          </div>
          <div id="relation-graph"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
let graphChart = null;

window.onAppDataLoaded = function(data) {
  const select = document.getElementById('site-select');
  data.reports.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.name;
    opt.textContent = `${r.name} (${r.province}, ${r.entities}实体)`;
    select.appendChild(opt);
  });
  
  select.addEventListener('change', (e) => {
    if (e.target.value) {
      showSiteRelations(e.target.value);
    } else {
      document.getElementById('site-info').style.display = 'none';
    }
  });
};

function showSiteRelations(siteName) {
  const report = RELATIONS_DATA.reports.find(r => r.site_name === siteName);
  if (!report) return;
  
  document.getElementById('site-info').style.display = 'block';
  
  // 关系统计
  const statsDiv = document.getElementById('relation-stats');
  statsDiv.innerHTML = `<p><strong>总关系数:</strong> ${report.total_relations.toLocaleString()} 条</p>`;
  const typeNames = RELATIONS_DATA.relation_types;
  for (const [type, count] of Object.entries(report.type_stats)) {
    const name = typeNames[type] || type;
    statsDiv.innerHTML += `<p style="margin:6px 0"><span class="tag" style="background:rgba(102,126,234,0.1);color:var(--primary)">${name}</span> ${count.toLocaleString()} 条</p>`;
  }
  
  // TOP10关系对
  const tbody = document.querySelector('#top-pairs-table tbody');
  tbody.innerHTML = '';
  report.top_pairs.slice(0, 10).forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${p.subject}</td><td><span class="tag tag-era">${p.relation}</span></td><td>${p.object}</td><td style="text-align:right;font-weight:600">${p.count}</td>`;
    tbody.appendChild(tr);
  });
  
  // 关系网络图
  renderGraph(report);
  
  document.getElementById('site-info').scrollIntoView({ behavior: 'smooth' });
}

function renderGraph(report) {
  if (!graphChart) {
    graphChart = echarts.init(document.getElementById('relation-graph'));
  }
  
  // 构建节点和边
  const nodes = [];
  const edges = [];
  const nodeSet = new Set();
  const colors = ['#667eea','#e74c3c','#2ecc71','#f1c40f','#9b59b6','#1abc9c'];
  const typeColors = {};
  let colorIdx = 0;
  
  // 使用TOP20关系对构建网络
  report.top_pairs.slice(0, 20).forEach((p, i) => {
    if (!typeColors[p.relation]) {
      typeColors[p.relation] = colors[colorIdx % colors.length];
      colorIdx++;
    }
    
    const subjId = p.subject;
    const objId = p.object;
    
    if (!nodeSet.has(subjId)) {
      nodeSet.add(subjId);
      nodes.push({ id: subjId, name: subjId, symbolSize: Math.max(20, Math.min(60, p.count * 2)), category: 0 });
    }
    if (!nodeSet.has(objId)) {
      nodeSet.add(objId);
      nodes.push({ id: objId, name: objId, symbolSize: 20, category: 1 });
    }
    
    edges.push({
      source: subjId,
      target: objId,
      value: p.count,
      label: { show: i < 8, formatter: p.relation, fontSize: 10 },
      lineStyle: { color: typeColors[p.relation], width: Math.max(1, Math.min(4, p.count / 50)) }
    });
  });
  
  graphChart.setOption({
    tooltip: {},
    animationDurationUpdate: 1500,
    animationEasingUpdate: 'quinticInOut',
    series: [{
      type: 'graph',
      layout: 'force',
      data: nodes,
      links: edges,
      roam: true,
      label: { show: true, fontSize: 11 },
      force: { repulsion: 300, edgeLength: [50, 150] },
      emphasis: {
        focus: 'adjacency',
        lineStyle: { width: 4 }
      }
    }]
  }, true);
}
</script>
</body>
</html>
